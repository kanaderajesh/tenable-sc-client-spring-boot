tenable:
  sc:
    # Default authentication mode applied to all endpoints that do not set their own.
    # Options: TOKEN | API_KEY
    auth-mode: API_KEY

    # Set to true only when using self-signed certificates; never enable in production.
    ssl-verification-disabled: false

    # HTTP client timeouts (milliseconds) — shared across all endpoints.
    connect-timeout: 10000
    read-timeout: 60000

    # Default page size for paginated queries.
    default-page-size: 1000

    # Optional client IP allowlist.
    # When non-empty, only requests from these IPs are accepted (403 otherwise).
    # Leave empty (or omit) to allow all client IPs.
    # Supports X-Forwarded-For for deployments behind a reverse proxy.
    #
    # allowed-client-ips:
    #   - 10.0.0.5
    #   - 192.168.1.10
    #   - 172.16.0.0
    allowed-client-ips: []

    # -------------------------------------------------------------------------
    # Security Center endpoints, one entry per region.
    # Region keys are matched case-insensitively (APAC == apac).
    #
    # Per-endpoint fields:
    #   base-url   (required)  — SC host, no trailing slash
    #   auth-mode  (optional)  — overrides the global auth-mode for this endpoint
    #
    #   TOKEN mode credentials:
    #     username / password
    #
    #   API_KEY mode credentials:
    #     access-key / secret-key
    # -------------------------------------------------------------------------
    endpoints:

      APAC:
        base-url: https://sc-apac.example.com
        # Inherits global auth-mode: API_KEY
        access-key: apac-access-key-placeholder
        secret-key: apac-secret-key-placeholder

      EMEA:
        base-url: https://sc-emea.example.com
        # Inherits global auth-mode: API_KEY
        access-key: emea-access-key-placeholder
        secret-key: emea-secret-key-placeholder

      AMER:
        base-url: https://sc-amer.example.com
        # Inherits global auth-mode: API_KEY
        access-key: amer-access-key-placeholder
        secret-key: amer-secret-key-placeholder

      APAC-GOV:
        base-url: https://sc-apac-gov.example.com
        # Per-endpoint override: this instance only supports session-token auth
        auth-mode: TOKEN
        username: apac-gov-username-placeholder
        password: apac-gov-password-placeholder

server:
  port: 8080
